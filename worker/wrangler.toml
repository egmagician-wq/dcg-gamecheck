name = "dcg-gamecheck"
main = "src/index.js"
compatibility_date = "2026-01-01"

# *domain.net (نجمة بدل www.) عشان يغطي الدومين بـ www وبدونه — نفس الأسلوب
# المستخدم في ووركرز الموقع التانية (push-topic, swjs) على نفس الحساب
routes = [
  { pattern = "*downloadcomputergames.net/check/*", zone_name = "downloadcomputergames.net" }
]

rules = [
  { type = "Text", globs = ["**/*.html"], fallthrough = true }
]
